# ════════════════════════════════════════════════════════════
# ManzxyCodes — Nginx Reverse Proxy Config
# © 2026 By Manzxy
#
# Cara pakai:
#   sudo cp nginx.conf /etc/nginx/sites-available/manzxycodes
#   sudo ln -s /etc/nginx/sites-available/manzxycodes /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL dengan Certbot:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d manzxycodes.com -d www.manzxycodes.com
# ════════════════════════════════════════════════════════════

# HTTP → redirect ke HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name manzxy.biz.id www.manzxy.biz.id;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect semua ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name manzxy.biz.id www.manzxy.biz.id;

    # ── SSL Certificate (diisi otomatis oleh Certbot)
    ssl_certificate     /etc/letsencrypt/live/manzxy.biz.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manzxy.biz.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ── Security headers
    add_header X-Frame-Options         "SAMEORIGIN"             always;
    add_header X-Content-Type-Options  "nosniff"                always;
    add_header X-XSS-Protection        "1; mode=block"          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # ── Logging
    access_log /var/log/nginx/manzxy.biz.id.access.log;
    error_log  /var/log/nginx/manzxy.biz.id.error.log;

    # ── Rate limiting (definisikan di nginx.conf main jika belum ada)
    # limit_req_zone $binary_remote_addr zone=manzxy:10m rate=30r/m;

    # ── Proxy semua request ke Node.js Express (manzxy.js)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;

        # Matikan cache untuk API
        proxy_no_cache     $request_uri;
    }

    # ── Cache static assets (html/css/js)
    location ~* \.(html|css|js|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
